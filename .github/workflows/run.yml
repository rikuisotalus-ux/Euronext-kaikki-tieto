name: Euronext API Scraper

on:
  schedule:
    - cron: "0 16 * * *"   # klo 17 Suomessa (kesäaika)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape_euronext.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add combined_settlement.csv

          git diff --cached --quiet || git commit -m "Update settlement data"

          git push
